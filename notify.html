<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>FirstBank - Notifications</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    -webkit-tap-highlight-color: transparent;
  }
  
  body {
    font-family: 'Inter', sans-serif;
    background: #0f1d33;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
  }
  
  .fb-container {
    width: 100%;
    max-width: 400px;
    min-height: 100vh;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #0f1d33;
    padding: 0 16px 20px;
  }
  
  /* Abstract geometric shapes background */
  .bg-shapes {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }
  
  .shape {
    position: absolute;
    background: rgba(255,255,255,0.03);
    border-radius: 4px;
  }
  
  .shape-1 { width: 120px; height: 160px; top: 8%; left: 15%; transform: rotate(-8deg); background: rgba(255,255,255,0.025); }
  .shape-2 { width: 60px; height: 80px; top: 6%; left: 38%; transform: rotate(-5deg); background: rgba(255,255,255,0.02); }
  .shape-3 { width: 40px; height: 50px; top: 10%; left: 50%; transform: rotate(-3deg); background: rgba(255,255,255,0.02); }
  .shape-4 { width: 100px; height: 140px; top: 12%; left: 55%; transform: rotate(-6deg); background: rgba(255,255,255,0.025); }
  .shape-5 { width: 140px; height: 200px; top: 38%; left: -5%; transform: rotate(-10deg); background: rgba(255,255,255,0.02); }
  .shape-6 { width: 80px; height: 120px; top: 42%; left: 8%; transform: rotate(-7deg); background: rgba(255,255,255,0.015); }
  .shape-7 { width: 180px; height: 260px; top: 48%; left: 5%; transform: rotate(-12deg); background: rgba(255,255,255,0.02); }
  .shape-8 { width: 100px; height: 150px; top: 40%; left: 70%; transform: rotate(8deg); background: rgba(255,255,255,0.02); }
  .shape-9 { width: 60px; height: 90px; top: 35%; left: 85%; transform: rotate(5deg); background: rgba(255,255,255,0.015); }
  .shape-10 { width: 120px; height: 170px; top: 85%; left: 10%; transform: rotate(-6deg); background: rgba(255,255,255,0.02); }
  .shape-11 { width: 80px; height: 110px; top: 88%; left: 25%; transform: rotate(-4deg); background: rgba(255,255,255,0.015); }
  .shape-12 { width: 100px; height: 140px; top: 82%; left: 70%; transform: rotate(6deg); background: rgba(255,255,255,0.02); }
  
  /* Header */
  .fb-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 16px 0 20px;
    z-index: 10;
    position: relative;
  }
  
  .fb-header-title {
    color: white;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  
  .fb-header-back {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.05);
    border-radius: 8px;
    padding: 8px 14px;
    color: white;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s ease, transform 0.1s ease;
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  
  .fb-header-back:active {
    background: rgba(255,255,255,0.15);
    transform: scale(0.95);
  }
  
  .fb-header-back svg {
    display: block;
  }
  
  /* Notification Content */
  .fb-notification-content {
    flex: 1;
    width: 100%;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 0;
    gap: 24px;
  }
  
  .fb-notification-icon {
    width: 80px;
    height: 80px;
    background: rgba(255,255,255,0.05);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255,255,255,0.06);
  }
  
  .fb-notification-icon svg {
    opacity: 0.4;
  }
  
  .fb-notification-empty {
    color: rgba(255,255,255,0.5);
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }
  
  .fb-notification-sub {
    color: rgba(255,255,255,0.3);
    font-size: 13px;
    font-weight: 300;
    letter-spacing: 0.3px;
  }
  
  /* Welcome Card - Non-clickable, transparent */
  .fb-welcome-card {
    width: 100%;
    max-width: 320px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 12px;
    padding: 16px 20px;
    text-align: center;
    pointer-events: none;
    user-select: none;
    margin-top: 8px;
  }
  
  .fb-welcome-card .welcome-text {
    color: rgba(255,255,255,0.6);
    font-size: 14px;
    font-weight: 400;
    letter-spacing: 0.3px;
  }
  
  .fb-welcome-card .welcome-highlight {
    color: #d4a017;
    font-weight: 600;
  }
  
  .fb-welcome-card .welcome-sub {
    color: rgba(255,255,255,0.3);
    font-size: 11px;
    font-weight: 300;
    margin-top: 4px;
    letter-spacing: 0.5px;
  }
  
  .fb-welcome-divider {
    width: 40px;
    height: 1px;
    background: rgba(255,255,255,0.08);
    margin: 8px auto 0;
  }
  
  /* Professional Bank Stats */
  .fb-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    width: 100%;
    max-width: 320px;
    margin-top: 4px;
  }
  
  .fb-stat-item {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.04);
    border-radius: 8px;
    padding: 12px 10px;
    text-align: center;
    pointer-events: none;
    user-select: none;
  }
  
  .fb-stat-item .stat-value {
    color: rgba(255,255,255,0.7);
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  
  .fb-stat-item .stat-label {
    color: rgba(255,255,255,0.25);
    font-size: 9px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-top: 2px;
  }
  
  .fb-stat-item .stat-icon {
    color: rgba(212, 160, 23, 0.3);
    font-size: 18px;
    margin-bottom: 4px;
  }
  
  /* Version */
  .fb-version {
    color: rgba(255,255,255,0.2);
    font-size: 10px;
    text-align: center;
    z-index: 10;
    padding: 16px 0 4px;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>

<div class="fb-container">
  <!-- Abstract geometric background shapes -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
    <div class="shape shape-4"></div>
    <div class="shape shape-5"></div>
    <div class="shape shape-6"></div>
    <div class="shape shape-7"></div>
    <div class="shape shape-8"></div>
    <div class="shape shape-9"></div>
    <div class="shape shape-10"></div>
    <div class="shape shape-11"></div>
    <div class="shape shape-12"></div>
  </div>
  
  <!-- Header -->
  <div class="fb-header">
    <button class="fb-header-back" id="backBtn">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/>
      </svg>
      Back
    </button>
    <span class="fb-header-title">Notifications</span>
    <div style="width: 60px;"></div> <!-- Spacer for alignment -->
  </div>
  
  <!-- Notification Content -->
  <div class="fb-notification-content">
    <!-- Bell Icon -->
    <div class="fb-notification-icon">
      <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
        <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
      </svg>
    </div>
    
    <div class="fb-notification-empty">No notifications available</div>
    <div class="fb-notification-sub">You're all caught up</div>
    
    <!-- Welcome Card - Non-clickable, transparent -->
    <div class="fb-welcome-card">
      <div class="welcome-text">
        Welcome to <span class="welcome-highlight">FirstBank</span>
      </div>
      <div class="fb-welcome-divider"></div>
      <div class="welcome-sub">
        Your trusted partner since 1894
      </div>
    </div>
    
    <!-- Professional Bank Stats -->
    <div class="fb-stats">
      <div class="fb-stat-item">
        <div class="stat-icon">🏦</div>
        <div class="stat-value">50M+</div>
        <div class="stat-label">Customers</div>
      </div>
      <div class="fb-stat-item">
        <div class="stat-icon">🌍</div>
        <div class="stat-value">10+</div>
        <div class="stat-label">Countries</div>
      </div>
      <div class="fb-stat-item">
        <div class="stat-icon">⭐</div>
        <div class="stat-value">4.7★</div>
        <div class="stat-label">Rating</div>
      </div>
      <div class="fb-stat-item">
        <div class="stat-icon">🔒</div>
        <div class="stat-value">100%</div>
        <div class="stat-label">Secure</div>
      </div>
    </div>
  </div>
  
  <!-- Version -->
  <div class="fb-version">VERSION 2.11.8 - Android API 34 TECNO KL4</div>
</div>

<script>
  (function() {
    // Back button - redirect to login page
    document.getElementById('backBtn').addEventListener('click', function() {
      window.location.href = 'index.html';
    });
    
    // Optional: handle physical back button (Android)
    window.addEventListener('popstate', function() {
      window.location.href = 'index.html';
    });
  })();
</script>

</body>
</html>
