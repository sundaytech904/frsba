<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Transaction PIN</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background-color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            padding: 16px 16px 16px 12px;
            background-color: #1e2d42;
            background-image: url('bg1.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 56px;
        }

        .back-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .back-btn svg {
            width: 24px;
            height: 24px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 0.3px;
        }

        /* Content */
        .content {
            flex: 1;
            padding: 40px 24px;
        }

        .page-title {
            font-size: 28px;
            font-weight: 400;
            color: #000000;
            text-align: center;
            margin-bottom: 48px;
        }

        .form-group {
            margin-bottom: 36px;
        }

        .form-label {
            font-size: 16px;
            font-weight: 400;
            color: #9e9e9e;
            margin-bottom: 4px;
            display: block;
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .form-input {
            width: 100%;
            border: none;
            border-bottom: 1.5px solid #9e9e9e;
            padding: 8px 0;
            font-size: 18px;
            font-weight: 400;
            color: #9e9e9e;
            background: none;
            outline: none;
            font-family: inherit;
        }

        .form-input:focus {
            border-bottom-color: #1e2d42;
            color: #000000;
        }

        .refresh-icon {
            position: absolute;
            right: 0;
            bottom: 8px;
            width: 22px;
            height: 22px;
            cursor: pointer;
            background: none;
            border: none;
            padding: 0;
        }

        .refresh-icon svg {
            width: 20px;
            height: 20px;
            stroke: #000000;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .save-btn {
            display: block;
            width: 100%;
            margin-top: 48px;
            background-color: #e8d5a0;
            color: #8a8a8a;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            padding: 18px 0;
            border-radius: 32px;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-family: inherit;
        }

        .save-btn:active {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <a href="settings.html" class="back-btn">
            <svg viewBox="0 0 24 24">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
        </a>
        <div class="header-title">Reset Transaction PIN</div>
    </div>

    <!-- Content -->
    <div class="content">
        <h1 class="page-title">Reset Transaction PIN</h1>

        <div class="form-group">
            <label class="form-label">Enter Security Question</label>
            <div class="input-wrapper">
                <input type="text" class="form-input" value="My maiden name" readonly>
                <button class="refresh-icon" type="button" onclick="refreshQuestion()">
                    <svg viewBox="0 0 24 24">
                        <polyline points="23 4 23 10 17 10"></polyline>
                        <polyline points="1 20 1 14 7 14"></polyline>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
            </div>
        </div>

        <div class="form-group">
            <input type="text" class="form-input" placeholder="Enter Answer">
        </div>

        <div class="form-group">
            <input type="password" class="form-input" placeholder="New PIN" maxlength="6" inputmode="numeric">
        </div>

        <div class="form-group">
            <input type="password" class="form-input" placeholder="Confirm New PIN" maxlength="6" inputmode="numeric">
        </div>

        <button class="save-btn" type="button">SAVE</button>
    </div>

    <script>
        function refreshQuestion() {
            // Placeholder for refresh functionality
            console.log('Refresh security question');
        }
    </script>
</body>
</html>
